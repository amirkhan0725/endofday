name: Generate Release Keystore (run once)

# Run this ONCE from GitHub Actions → Run workflow.
# Download the artifact, then add the 4 values as GitHub secrets.
# After that, android-build.yml will produce signed release AABs automatically.

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate keystore
        run: |
          keytool -genkeypair \
            -alias endofday-release \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -keystore endofday-release.keystore \
            -storepass EndOfDay2024! \
            -keypass EndOfDay2024! \
            -dname "CN=EndOfDay, OU=Engineering, O=EndOfDay App, L=Unknown, ST=Unknown, C=US" \
            -noprompt

      - name: Encode keystore to base64
        run: |
          base64 -w 0 endofday-release.keystore > keystore.b64
          echo ""
          echo "=== KEYSTORE_BASE64 value (add as GitHub secret) ==="
          cat keystore.b64
          echo ""
          echo ""
          echo "=== Add these 4 secrets to your GitHub repo ==="
          echo "Secret name: KEYSTORE_BASE64"
          echo "Secret value: (the long base64 string above)"
          echo ""
          echo "Secret name: KEY_STORE_PASSWORD"
          echo "Secret value: EndOfDay2024!"
          echo ""
          echo "Secret name: KEY_ALIAS"
          echo "Secret value: endofday-release"
          echo ""
          echo "Secret name: KEY_PASSWORD"
          echo "Secret value: EndOfDay2024!"

      - name: Upload keystore files
        uses: actions/upload-artifact@v4
        with:
          name: release-keystore
          path: |
            endofday-release.keystore
            keystore.b64
          retention-days: 1
